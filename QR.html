<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="MyWebSite" />
  <link rel="manifest" href="/site.webmanifest" />

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Reads</title>

  <style>
.logo {
  height: 70px;
  width: auto;
  object-fit: contain;
  cursor: pointer;
  transition: transform 0.3s ease;
}

.logo:hover {
  transform: scale(1.05);
}

header {
  padding: 20px;
  max-width: 600px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

:root {
  --primary: #6366f1;
  --bg-gradient: linear-gradient(-45deg, #f5f7fa, #c3cfe2, #e2ebf0, #cfd9df);
  --card-bg: rgba(255, 255, 255, 0.7);
  --text: #1f2937;
  --glass-border: rgba(255, 255, 255, 0.4);
}

body.dark {
  --bg-gradient: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #020617);
  --card-bg: rgba(30, 41, 59, 0.7);
  --text: #f8fafc;
  --glass-border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg-gradient);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color: var(--text);
  transition: all 0.4s ease;
  padding-bottom: 110px;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.glass {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

/* HEADER FIXED ABOVE */

/* THEME BUTTON */
.theme-btn {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: 0.3s;
}

main {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px;
}

.welcome-card {
  padding: 20px;
  border-radius: 24px;
  margin-bottom: 20px;
  animation: zoomIn 0.6s ease;
}

.phase-pill {
  display: flex;
  background: rgba(0,0,0,0.05);
  padding: 5px;
  border-radius: 16px;
  margin-bottom: 20px;
  gap: 5px;
}

.phase-pill button {
  flex: 1;
  border: none;
  background: none;
  padding: 12px;
  border-radius: 12px;
  color: var(--text);
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}

.phase-pill button.active {
  background: var(--primary);
  color: white;
}

/* STORY CARDS */
.story-card {
  border-radius: 20px;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
}

.story-card:hover {
  transform: translateX(10px);
  background: rgba(255, 255, 255, 0.9);
}

body.dark .story-card:hover {
  background: rgba(255, 255, 255, 0.15);
}

.story-icon {
  width: 50px;
  height: 50px;
  border-radius: 15px;
  display: grid;
  place-items: center;
  color: white;
  font-weight: 800;
  font-size: 20px;
  flex-shrink: 0;
  margin-right: 15px;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.story-card:hover .story-icon {
  transform: scale(1.2) rotate(-10deg);
}

.story-details { display: flex; flex-direction: column; }
.story-details b { font-size: 16px; }
.story-details small { opacity: 0.6; font-size: 12px; }

.spacer { flex-grow: 1; }

.read-link {
  background: #34a853;
  color: white;
  padding: 10px 18px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 800;
  font-size: 12px;
  transition: 0.3s;
}

.read-link:hover {
  transform: scale(1.1);
}

/* SECTIONS */
.tab-section { display: none; }
.tab-section.active { display: block; }

.stagger-in > div {
  opacity: 0;
  animation: fadeInUp 0.5s ease forwards;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes zoomIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* BOTTOM NAV */
nav.bottom-nav {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 400px;
  height: 70px;
  border-radius: 24px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 1000;
}

.nav-btn {
  background: none;
  border: none;
  color: var(--text);
  opacity: 0.5;
  font-weight: 700;
  font-size: 11px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: 0.3s;
}

.nav-btn.active {
  opacity: 1;
  color: var(--primary);
  transform: translateY(-5px);
}
  </style>
</head>

<body>

<!-- ✅ FIXED HEADER (NO NESTING ERROR) -->
<header>
  <img src="weblogo.png" alt="Quick Reads Logo" class="logo">
  <div class="glass theme-btn" onclick="toggleDark()" id="themeIcon">🌙</div>
</header>

<main>
  <div class="glass welcome-card">
    <h2 style="margin:0">Welcome back 👋</h2>
    <p style="margin:5px 0 0; opacity:0.6">For Anyone. Anytime. Anywhere.</p>
  </div>

  <section id="stories" class="tab-section active">

    <div class="phase-pill">
      <button class="active" onclick="showPhase('phase1', this)">Phase 1</button>
      <button onclick="showPhase('phase2', this)">Phase 2</button>
    </div>

    <div id="p1-container" class="stagger-in">
      <!-- YOUR STORIES (UNCHANGED) -->
    </div>

    <div id="p2-container" class="stagger-in" style="display:none">
      <!-- YOUR STORIES (UNCHANGED) -->
    </div>

  </section>
</main>

<script>
function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
  localStorage.setItem('qr-dark', isDark);
}

if(localStorage.getItem('qr-dark') === 'true') {
  document.body.classList.add('dark');
  document.getElementById('themeIcon').innerText = '☀️';
}

function showPhase(phase, btn) {
  document.getElementById('p1-container').style.display = (phase === 'phase1') ? 'block' : 'none';
  document.getElementById('p2-container').style.display = (phase === 'phase2') ? 'block' : 'none';
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>

</body>
</html>
